<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo Encontré | Objetos perdidos del campus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
</head>

<body>

    <header>
        <a href="index.html" class="brand">
            <img src="assets/images/logo.svg" alt="Lo Encontré logo">
        </a>

        <button class="menu-toggle" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav>
            <a href="index.html">Inicio</a>
            <a class="active" href="objetos.html">Objetos</a>
            <a href="reportar.html">Reportar</a>
        </nav>
    </header>

    <main>

        <section>
            <div class="objects-text">

                <h1>Objetos reportados</h1>

                <p>
                    Explora los objetos perdidos y encontrados
                    reportados por la comunidad universitaria.
                </p>

                <p id="objectsTotal" class="objects-total" aria-live="polite"></p>

            </div>
        </section>

        <section class="filters">

            <input id="searchInput" type="search" placeholder="Buscar objeto...">

            <select id="categoryFilter">
                <option>Todas las categorías</option>
                <option>Electrónicos</option>
                <option>Accesorios</option>
                <option>Académico</option>
                <option>Llaves</option>
                <option>Otros</option>
            </select>

            <select id="statusFilter">
                <option>Todos los estados</option>
                <option>Perdido</option>
                <option>Encontrado</option>
                <option>Recuperado</option>
            </select>

        </section>

        <section id="objectsGrid" class="objects-grid">

        </section>

    </main>

    <footer>
        <div class="footer-top">

            <a href="index.html" class="footer-brand">
                <img src="assets/images/logo.svg" alt="Lo Encontré logo">
            </a>

            <p class="footer-tagline">
                Reportá. Buscá. Recuperá.
            </p>

        </div>

        <div class="footer-bottom">

            <p>
                &copy; 2026 Lo Encontré. Todos los derechos reservados.
            </p>

            <p class="footer-credit">
                Hecho por
                <a href="https://bushcoding.com/fredericjasmin" target="_blank">
                    Frederic Jasmin
                </a>
                ·
                <a href="mailto:frederic@bushcoding.com">
                    frederic@bushcoding.com
                </a>
            </p>

        </div>
    </footer>

    <div id="imageModal" class="image-modal">

        <img id="modalImage" src="" alt="">

        <p>Toca cualquier parte para cerrar</p>

    </div>
    <script src="js/menu.js"></script>
    <script src="js/objetos.js"></script>

</body>

</html>
